{% extends 'base.html' %}

{% block title %}Login - SJB Portfolio{% endblock %}

{% block content %}
<div style="background: linear-gradient(rgba(230, 243, 255, 0.92), rgba(230, 243, 255, 0.92)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b'); background-size: cover; background-position: center; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto">
            <div class="card" style="animation: float 4s ease-in-out infinite;">
                <div class="text-center mb-8">
                    <i class="fas fa-robot text-6xl text-[#003366] mb-4"></i>
                    <h2 class="text-3xl font-bold text-[#003366]">Welcome to SJB Portfolio</h2>
                    <p class="text-gray-600 mt-2">Please login to continue</p>
                </div>
                
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        Invalid username or password. Please try again.
                    </div>
                    {% endif %}
                    
                    <div>
                        <label class="block text-[#003366] font-medium mb-2">
                            <i class="fas fa-user mr-2"></i>Username
                        </label>
                        <input type="text" name="username" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#003366] focus:ring-1 focus:ring-[#003366]"
                               placeholder="Enter your username">
                    </div>
                    
                    <div>
                        <label class="block text-[#003366] font-medium mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input type="password" name="password" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#003366] focus:ring-1 focus:ring-[#003366]"
                               placeholder="Enter your password">
                    </div>
                    
                    <button type="submit" class="w-full btn-primary py-3 text-lg">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                </form>
                
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
