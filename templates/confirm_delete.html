{% extends 'base.html' %}

{% block title %}Delete Project{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <div class="max-w-md mx-auto">
        <div class="card text-center">
            <div class="text-red-500 mb-4">
                <i class="fas fa-exclamation-triangle text-6xl"></i>
            </div>
            
            <h1 class="text-2xl font-bold text-[#003366] mb-4">Delete Project</h1>
            
            <p class="text-gray-600 mb-6">
                Are you sure you want to delete "{{ project.title }}"?
                <br>This action cannot be undone.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="flex gap-4 justify-center">
                    <button type="submit" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">
                        <i class="fas fa-trash mr-2"></i>Yes, Delete
                    </button>
                    <a href="{% url 'projects:project_detail' slug=project.slug %}" 
                       class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
